<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQM Árajánlat PDF generátor</title>
<style>
  * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; }
  body { background: #f4f4f4; display: flex; align-items: flex-start; justify-content: center; min-height: 100vh; padding: 32px 16px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 28px 32px; width: 400px; }
  h1 { font-size: 17px; margin: 0 0 4px; color: #2e2c2c; }
  .sub { font-size: 12px; color: #888; margin: 0 0 20px; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
  input[type=text], textarea {
    width: 100%; padding: 9px 11px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 14px; font-family: inherit;
  }
  input[type=text] { margin-bottom: 14px; }
  input[type=text]:focus, textarea:focus { outline: none; border-color: #ffde1d; }
  textarea { resize: vertical; min-height: 130px; line-height: 1.6; color: #333; }
  .msg-wrap { margin-bottom: 14px; }
  .msg-label { font-size: 13px; color: #555; margin-bottom: 6px; }
  .msg-hint { font-size: 11px; color: #aaa; }
  .btn-primary {
    width: 100%; padding: 11px; background: #2e2c2c; color: #ffde1d;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .btn-primary:disabled { opacity: .45; cursor: default; }
  .status { margin-top: 18px; border-top: 1px solid #eee; padding-top: 14px; display: none; }
  .step { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 9px; color: #bbb; }
  .step.active { color: #2e2c2c; }
  .step.done { color: #1a9e63; }
  .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid currentColor; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
  .step.active .dot { animation: pulse 1s infinite; }
  .step.done .dot::after { content: "✓"; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
  .pdf-link {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 14px; font-size: 13px; color: #2e2c2c; font-weight: 700;
    text-decoration: none; padding: 10px; border: 2px solid #ffde1d; border-radius: 8px;
  }
  .meta { font-size: 11px; color: #999; margin-top: 8px; line-height: 1.5; }
  .meta.warn { color: #b96a00; }
  .meta.err  { color: #b3261e; }
  .error-box { margin-top: 12px; font-size: 12px; color: #b3261e; background: #fdecec; padding: 10px 12px; border-radius: 8px; display: none; line-height: 1.5; }
  .btn-retry { margin-top: 10px; width: 100%; padding: 9px; background: #fff; color: #2e2c2c; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; cursor: pointer; display: none; }
  .btn-retry:hover { background: #f4f4f4; }
</style>
</head>
<body>
<div class="card">
  <h1>Árajánlat PDF generátor</h1>
  <p class="sub">Innonest BID alapján</p>

  <label for="bid">BID szám</label>
  <input type="text" id="bid" placeholder="BID-2026-185" autocomplete="off">

  <div class="msg-wrap">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
      <span class="msg-label">Üzenet az értékesítőnek</span>
      <span class="msg-hint" id="msgHint">BID megadása után töltődik</span>
    </div>
    <textarea id="msgBox" placeholder="Add meg a BID számot, majd automatikusan kitöltődik..."></textarea>
  </div>

  <button class="btn-primary" id="startBtn">PDF generálása</button>

  <div class="status" id="status">
    <div class="step" data-step="scraping"><div class="dot"></div>Adatok kiolvasása az Innonestből</div>
    <div class="step" data-step="rendering"><div class="dot"></div>PDF renderelése</div>
    <div class="step" data-step="uploading_innonest"><div class="dot"></div>Feltöltés az Innonestbe</div>
    <div class="step" data-step="sending_email"><div class="dot"></div>Email küldése az értékesítőnek</div>
    <a class="pdf-link" id="pdfLink" href="#" target="_blank" style="display:none;">↓ PDF megnyitása</a>
    <div class="meta" id="meta" style="display:none;"></div>
    <button class="btn-retry" id="retryEmailBtn">↺ Email újraküldése</button>
  </div>
  <div class="error-box" id="errorBox"></div>
</div>

<script>
const ORDER = ["scraping", "rendering", "uploading_innonest", "sending_email", "done"];
const bidInput     = document.getElementById("bid");
const startBtn     = document.getElementById("startBtn");
const statusBox    = document.getElementById("status");
const errorBox     = document.getElementById("errorBox");
const pdfLink      = document.getElementById("pdfLink");
const metaBox      = document.getElementById("meta");
const msgBox       = document.getElementById("msgBox");
const msgHint      = document.getElementById("msgHint");
const retryBtn     = document.getElementById("retryEmailBtn");

let currentJobId = null;
let userEditedMsg = false;  // true ha a felhasználó kézzel szerkesztette

// BID bevitelkor előtölti az üzenetsablont a BID-del
// userEditedMsg-et CSAK itt reseteljük (új BID = új szöveg), nem a gomb kattintáskor
bidInput.addEventListener("input", () => {
  const bid = bidInput.value.trim().toUpperCase();
  userEditedMsg = false;  // Reset: új BID esetén az előtöltés újra mehet
  if (/^BID-\d{4}-\d+$/.test(bid)) {
    msgBox.value =
      "Elkészült egy árajánlat PDF.\n\n" +
      "Csatolva találod a " + bid + " árajánlat PDF verzióját " +
      "— a fájl az Innonestben is csatolásra kerül a BID-hez.\n\n" +
      "Ügyfél:\t(betöltés folyamatban...)\n" +
      "Tárgy:\t(betöltés folyamatban...)\n" +
      "Nettó összeg:\t(betöltés folyamatban...)";
    msgHint.textContent = "szerkeszthető";
  } else {
    msgBox.value = "";
    msgHint.textContent = "BID megadása után töltődik";
  }
});

// Ha a felhasználó maga szerkeszti az üzenetet
msgBox.addEventListener("input", () => { userEditedMsg = true; msgHint.textContent = "szerkesztve"; });

function resetUI() {
  errorBox.style.display = "none";
  pdfLink.style.display = "none";
  metaBox.style.display = "none";
  retryBtn.style.display = "none";
  statusBox.style.display = "block";
  document.querySelectorAll(".step").forEach(s => s.className = "step");
}

function setSteps(currentStatus) {
  const idx = ORDER.indexOf(currentStatus);
  document.querySelectorAll(".step").forEach(s => {
    const si = ORDER.indexOf(s.dataset.step);
    s.className = "step";
    if (currentStatus === "done" || si < idx) s.classList.add("done");
    else if (si === idx) s.classList.add("active");
  });
}

async function triggerPhase2(jobId) {
  try {
    await fetch("/confirm-arajanlat-pdf/" + jobId, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ custom_message: msgBox.value })
    });
    poll(jobId);
  } catch(e) {
    errorBox.textContent = "Hálózati hiba a küldéskor: " + e.message;
    errorBox.style.display = "block";
    startBtn.disabled = false;
  }
}

async function poll(jobId) {
  try {
    const resp = await fetch("/pdf-status/" + jobId);
    const data = await resp.json();

    if (data.status === "error") {
      errorBox.textContent = "Hiba: " + (data.message || "ismeretlen hiba");
      errorBox.style.display = "block";
      startBtn.disabled = false;
      return;
    }

    // PDF kész — frissítjük az üzenetet ha a user nem szerkesztette, majd automatikusan elindítjuk a 2. fázist
    if (data.status === "pdf_ready") {
      setSteps("rendering");
      pdfLink.href = "/pdf-download/" + jobId;
      pdfLink.textContent = "↓ PDF megnyitása – " + (data.bid_szam || "");
      pdfLink.style.display = "flex";

      // Üzenet frissítése valódi adatokkal ha a user nem szerkesztett
      if (!userEditedMsg && data.default_message) {
        msgBox.value = data.default_message;
        msgHint.textContent = "szerkeszthető";
      }

      // 2. fázis automatikus indítása
      triggerPhase2(jobId);
      return;
    }

    setSteps(data.status);

    // PDF letöltési link amint a path elérhető
    if (data.pdf_path && pdfLink.style.display === "none") {
      pdfLink.href = "/pdf-download/" + jobId;
      pdfLink.textContent = "↓ PDF megnyitása – " + (data.bid_szam || "");
      pdfLink.style.display = "flex";
    }

    if (data.status === "done") {
      const innonestOk = data.innonest_ok !== false;
      const emailOk    = data.email && data.email.success;
      const emailHiba  = data.email && data.email.message ? data.email.message : "ismeretlen hiba";

      if (!innonestOk && !emailOk) {
        metaBox.className = "meta err";
        metaBox.innerHTML = "Innonest feltöltés és email küldés sikertelen.<br>" + emailHiba;
      } else if (!innonestOk) {
        metaBox.className = "meta warn";
        metaBox.innerHTML = "Innonest feltöltés sikertelen.<br>Email elküldve: " + (data.email && data.email.owner_email || "");
      } else if (!emailOk) {
        metaBox.className = "meta warn";
        metaBox.innerHTML = "PDF Innonestbe feltöltve ✓<br>Email küldés sikertelen: <b>" + emailHiba + "</b>";
        retryBtn.style.display = "block";
      } else {
        metaBox.className = "meta";
        metaBox.textContent = (data.ugyfel_nev || "") + " — Innonestbe feltöltve, email elküldve: " + (data.email && data.email.owner_email || "");
      }
      metaBox.style.display = "block";
      startBtn.disabled = false;
      return;
    }

    setTimeout(() => poll(jobId), 1500);
  } catch(e) {
    setTimeout(() => poll(jobId), 2000);
  }
}

startBtn.addEventListener("click", async () => {
  const bid = bidInput.value.trim().toUpperCase();
  if (!/^BID-\d{4}-\d+$/.test(bid)) {
    alert("Érvénytelen BID formátum. Példa: BID-2026-185");
    return;
  }
  startBtn.disabled = true;
  // userEditedMsg NEM resetelődik itt – a felhasználó szerkesztett szövege megmarad
  resetUI();
  try {
    const resp = await fetch("/generate-arajanlat-pdf", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ bid })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || "Ismeretlen hiba");
    currentJobId = data.job_id;
    poll(currentJobId);
  } catch(e) {
    errorBox.textContent = e.message;
    errorBox.style.display = "block";
    startBtn.disabled = false;
  }
});

retryBtn.addEventListener("click", async () => {
  if (!currentJobId) return;
  retryBtn.disabled = true;
  retryBtn.textContent = "Küldés...";
  try {
    await fetch("/confirm-arajanlat-pdf/" + currentJobId, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ custom_message: msgBox.value })
    });
    retryBtn.style.display = "none";
    poll(currentJobId);
  } catch(e) {
    retryBtn.disabled = false;
    retryBtn.textContent = "↺ Email újraküldése";
  }
});

bidInput.addEventListener("keydown", e => { if (e.key === "Enter") startBtn.click(); });
</script>
</body>
</html>
